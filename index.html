<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parra — Arte</title>
  <meta name="description" content="Parra — pittura su tela e scultura. Opere originali.">
  <link rel="stylesheet" href="style.css">
  <style>
    /* home-only: preview strips */
    .preview-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 100%;
    }
    .strip-block {
      position: relative;
      overflow: hidden;
      height: 420px;
      cursor: pointer;
    }
    .strip-block img {
      transition: transform 0.6s ease, opacity 0.3s;
      opacity: 0.75;
    }
    .strip-block:hover img { transform: scale(1.04); opacity: 0.9; }
    .strip-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(13,18,69,0.85) 0%, transparent 55%);
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 2rem 2.5rem;
    }
    .strip-overlay h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      letter-spacing: 0.25em;
      color: #f5f0e8;
      font-weight: 400;
    }
    .strip-overlay .strip-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: rgba(245,240,232,0.6);
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }
    .strip-cta {
      display: inline-block;
      margin-top: 1rem;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e8520a;
      border-bottom: 1px solid rgba(232,82,10,0.4);
      padding-bottom: 2px;
    }
    .strip-divider { width: 1px; background: rgba(232,82,10,0.5); }
    @media (max-width: 640px) {
      .preview-strip { grid-template-columns: 1fr; }
      .strip-block { height: 280px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">PAR<span></span>RA</a>
    <ul class="nav-links">
      <li><a href="dipinti.html">Dipinti</a></li>
      <li><a href="sculture.html">Sculture</a></li>
      <li><a href="oggetti.html" class="active">Oggetti d'Arte</a></li>
      <li><a href="chi-sono.html">Chi sono</a></li>
      <li><a href="contatti.html">Contatti</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-img">
      <!-- Sostituisci con la tua immagine più rappresentativa -->
      <img src="img/dipinti/Mediterraneo_parra.jpg"  alt="Mediterraneo — Parra">
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>PARRA</h1>
      <p class="tagline">Pittura · Scultura · Oggetti d'Arte</p>
      <div class="hero-ctas">
        <a href="dipinti.html" class="btn primary">Dipinti</a>
        <a href="sculture.html" class="btn">Sculture</a>
        <a href="oggetti.html" class="btn">Oggetti d'Arte</a>
      </div>
    </div>
  </section>

  <!-- PREVIEW STRIP -->
  <div class="preview-strip">
    <a href="dipinti.html" class="strip-block fade-in">
      <img src="img/dipinti/SHOAH_parra.jpg" alt="Dipinti">
      <div class="strip-overlay">
        <h2>Dipinti</h2>
        <p class="strip-sub">acrilico su tela</p>
        <span class="strip-cta">Esplora la serie →</span>
      </div>
    </a>
    <a href="sculture.html" class="strip-block fade-in">
      <img src="img/sculture/rapace_parra.jpg" alt="Sculture">
      <div class="strip-overlay">
        <h2>Sculture</h2>
        <p class="strip-sub">Marmo, legno dipinto, manufatti</p>
        <span class="strip-cta">Esplora la serie →</span>
      </div>
    </a>
  </div>

  <footer>
    <p>© <span id="year"></span> Parra — Tutti i diritti riservati</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    // scroll fade-in
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.15 });
    document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
  </script>
</body>
</html>
